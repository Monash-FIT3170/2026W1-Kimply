services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kimply

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongodb:27017/kimply
      ROOT_URL: http://localhost:3000
      PORT: 3000
      METEOR_ALLOW_SUPERUSER: 1
    depends_on:
      - mongodb
    volumes:
      - ./app:/app
      - meteor_local:/app/.meteor/local
      - backend_node_modules:/app/node_modules

volumes:
  mongodb_data:
  meteor_local:
  backend_node_modules:
